<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arithmetic Made Simple Pro</title>
    <style>
        :root { --primary: #009900; --secondary: #3300FF; --bg: #f4f4f4; }
        body { background-color: var(--primary); font-family: sans-serif; margin: 0; padding: 15px; display: flex; justify-content: center; }
        .app-card { background: white; width: 100%; max-width: 450px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); padding: 20px; box-sizing: border-box; position: relative; }
        .header { text-align: center; margin-bottom: 15px; }
        .header h2 { margin: 0; color: var(--primary); }
        .display-area { background: #fff; border: 3px solid #333; border-radius: 15px; padding: 20px; text-align: center; margin-bottom: 20px; }
        .num-text { font-size: 65px; font-weight: bold; line-height: 1; margin: 5px 0; }
        .ans-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn { border: none; border-radius: 10px; padding: 18px; font-size: 20px; font-weight: bold; cursor: pointer; }
        .btn-ans { background: #dfe9ef; border: 2px solid var(--secondary); color: var(--secondary); }
        .btn-start { background: #77dd77; width: 100%; margin-top: 10px; }
        .stats { margin-top: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 14px; background: #eee; padding: 15px; border-radius: 10px; }
        #Response { text-align: center; font-weight: bold; min-height: 25px; margin: 10px 0; font-size: 18px; }
        .setup-section { background: #f9f9f9; padding: 15px; border-radius: 12px; margin-bottom: 10px; }
        select { width: 100%; padding: 12px; margin: 5px 0; border-radius: 8px; border: 1px solid #ddd; }
        
		#app-wrapper {
    animation: fadeIn 1.5s;
}
@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}
	
	</style>
</head>

<body>

<audio id="sndCorrect" src="correct.wav" preload="auto"></audio>
<audio id="sndWrong" src="wrong.wav" preload="auto"></audio>
<audio id="sndBgm" src="bgm.mp3" preload="auto" loop></audio>

<div class="app-card">
    <div class="header">
        <h2>Arithmetic Pro</h2>
        <small>by</small><br>
        <small>Gabriel Sunday(Suntechworld Global Services) </small>
    </div>

    <div id="setup" class="setup-section">
        <select id="diff">
            <option value="10">Easy (0-10)</option>
            <option value="20">Medium (0-20)</option>
            <option value="50">Hard (0-50)</option>
        </select>
        <select id="func">
            <option value="+">Addition</option>
            <option value="-">Subtraction</option>
            <option value="*">Multiplication</option>
        </select>
        <button class="btn btn-start" onclick="startGame()">START GAME</button>
    </div>

    <div id="game-ui" style="display:none;">
        <div id="Response">Touch an answer!</div>
        <div class="display-area">
            <div id="Q1" class="num-text">0</div>
            <div id="Sign" style="font-size:30px; color:#666;">+</div>
            <div id="Q2" class="num-text">0</div>
        </div>
        <div class="ans-grid">
            <button class="btn btn-ans" id="A1" onclick="check(this.innerText)"></button>
            <button class="btn btn-ans" id="A2" onclick="check(this.innerText)"></button>
            <button class="btn btn-ans" id="A3" onclick="check(this.innerText)"></button>
            <button class="btn btn-ans" id="A4" onclick="check(this.innerText)"></button>
        </div>
        <button class="btn" style="background:#ddd; width:100%; margin-top:15px;" onclick="stopGame()">QUIT</button>
    </div>

    <div class="stats">
        <div><b>Score:</b> <span id="pCorr">0</span></div>
        <div><b>Accuracy:</b> <span id="pAcc">0%</span></div>
    </div>
</div>

<script>
let correctAns = 0;
let score = { right: 0, wrong: 0 };

function playSnd(id) {
    const s = document.getElementById(id);
    s.currentTime = 0;
    s.play().catch(e => console.log("Sound blocked until interaction"));
}

function startGame() {
    document.getElementById('setup').style.display = 'none';
    document.getElementById('game-ui').style.display = 'block';
    document.getElementById('sndBgm').play(); // Start Music
    nextProblem();
}

function nextProblem() {
    let diff = parseInt(document.getElementById('diff').value);
    let sign = document.getElementById('func').value;
    let n1 = Math.floor(Math.random() * diff);
    let n2 = Math.floor(Math.random() * diff);
    
    if(sign === '-' && n1 < n2) [n1, n2] = [n2, n1];
    
    document.getElementById('Q1').innerText = n1;
    document.getElementById('Q2').innerText = n2;
    document.getElementById('Sign').innerText = (sign === '*') ? 'x' : sign;
    
    correctAns = eval(n1 + sign + n2);
    let opts = [correctAns];
    while(opts.length < 4) {
        let f = Math.floor(Math.random() * (diff * 2));
        if(!opts.includes(f)) opts.push(f);
    }
    opts.sort(() => Math.random() - 0.5);
    for(let i=1; i<=4; i++) document.getElementById('A'+i).innerText = opts[i-1];
}

function check(val) {
    if(parseInt(val) === correctAns) {
        score.right++;
        playSnd('sndCorrect');
        document.getElementById('Response').innerHTML = "<span style='color:green'>Correct!</span>";
        nextProblem();
    } else {
        score.wrong++;
        playSnd('sndWrong');
        document.getElementById('Response').innerHTML = "<span style='color:red'>Wrong!</span>";
    }
    updateStats();
}

function updateStats() {
    document.getElementById('pCorr').innerText = score.right;
    let total = score.right + score.wrong;
    document.getElementById('pAcc').innerText = Math.round((score.right/total)*100) + "%";
}

function stopGame() {
    document.getElementById('sndBgm').pause();
    location.reload();
}
</script>
</body>
</html>
    
   <img src="images/sunteclogo.png" class="logo" alt=""width="30" height="30">
